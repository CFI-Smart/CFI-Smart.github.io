<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Painel Financeiro Inteligente - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡️</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .hidden { display: none; }
    .login-container {
      background: #1e1e1e;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
      padding: 30px;
      width: 100%;
      max-width: 400px;
      margin: 50px auto;
      text-align: center;
    }
    .login-container h1 { color: #FFD700; margin-bottom: 20px; }
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; margin-bottom: 5px; color: #FFD700; font-weight: 600; }
    .input-group input {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid #444; background-color: #222;
      color: #fff; font-size: 16px;
    }
    .input-group input:focus {
      border-color: #FFD700; outline: none;
      box-shadow: 0 0 5px #FFD700;
    }
    .btn {
      background-color: #FFD700;
      color: #000;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .btn:hover { background-color: #e5c100; }
    .alerta {
      margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 14px; display: none;
    }
    .alerta.error { background-color: #ff4c4c; color: white; display: block; }
    .alerta.success { background-color: #4caf50; color: white; display: block; }
    .barra { height: 20px; background-color: #333; margin-top: 10px; border-radius: 5px; overflow: hidden; }
    .progresso { height: 100%; background-color: #FFD700; width: 0%; transition: width 0.5s; }
    canvas {
      width: 200px !important;
      height: 200px !important;
      margin: 20px auto;
      display: block;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #444; padding: 10px; text-align: center; }
    th { background-color: #333; }
    #painel-section { display: none; max-width: 800px; margin: 20px auto; }
    #btnLogout, #btnLimpar {
      background-color: #ff4c4c;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .acoes .btn { width: auto; margin: 5px 5px 0 0; }
  </style>
</head>
<body>
  <div id="login-section" class="login-container">
    <h1>🔐 Painel Financeiro Inteligente</h1>
    <div class="input-group">
      <label for="login-usuario">👤 Usuário</label>
      <input type="text" id="login-usuario" placeholder="Digite seu usuário" />
    </div>
    <div class="input-group">
      <label for="login-senha">🔒 Senha</label>
      <input type="password" id="login-senha" placeholder="Digite sua senha" />
    </div>
    <button class="btn" onclick="login()">Entrar</button>
    <div class="alerta" id="login-alerta"></div>
    <hr style="margin: 20px 0; border-color: #444;" />
    <h2 style="color:#FFD700">Cadastrar novo usuário</h2>
    <div class="input-group">
      <label for="cad-usuario">👤 Novo Usuário</label>
      <input type="text" id="cad-usuario" placeholder="Escolha um nome de usuário" />
    </div>
    <div class="input-group">
      <label for="cad-senha">🔒 Nova Senha</label>
      <input type="password" id="cad-senha" placeholder="Crie uma senha" />
    </div>
    <button class="btn" onclick="cadastrar()">Cadastrar</button>
    <div class="alerta" id="cad-alerta"></div>
  </div>

  <div id="painel-section"></div>

<script src="painel.js"></script>
</body>
</html>
