<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Painel Financeiro Inteligente - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡️</text></svg>" type="image/svg+xml" />

  <style>
    /* ===== Geral ===== */
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
      padding: 20px;
      margin: 0;
    }

    h1, h2 {
      margin: 0;
      padding: 0;
    }

    /* ===== LOGIN CARD ===== */
    .login-card {
      max-width: 400px;
      margin: 40px auto;
      padding: 30px 25px;
      background: linear-gradient(135deg, #1f1f1f, #121212);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.25);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-card h1 {
      font-weight: 900;
      font-size: 28px;
      margin-bottom: 25px;
      text-align: center;
      color: #FFD700;
    }
    .login-card h1 .destaque {
      color: #FFB800;
    }

    .login-card h2 {
      font-weight: 700;
      font-size: 22px;
      margin: 30px 0 15px;
      color: #FFD700;
      text-align: center;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #FFD700;
    }
    .input-group input {
      width: 100%;
      padding: 10px 15px;
      border-radius: 8px;
      border: 1.5px solid #555;
      background-color: #222;
      color: #fff;
      font-size: 16px;
      transition: border-color 0.3s ease;
    }
    .input-group input:focus {
      border-color: #FFD700;
      outline: none;
      box-shadow: 0 0 8px #FFD700;
    }

    /* Botão Login/Cadastro */
    .btn-login {
      width: 100%;
      background-color: #FFD700;
      color: #000;
      font-weight: 900;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 12px;
      transition: background-color 0.3s ease, color 0.3s ease;
      box-shadow: 0 6px 15px rgba(255, 215, 0, 0.5);
    }
    .btn-login:hover {
      background-color: #FFB800;
      color: #111;
    }

    /* Linha separadora */
    hr {
      border: 0;
      border-top: 1px solid #444;
      margin: 30px 0;
    }

    /* Alertas */
    .alerta {
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      text-align: center;
      white-space: pre-line;
    }
    .alerta.error {
      background-color: #ff4c4c;
      color: white;
    }
    .alerta.success {
      background-color: #4caf50;
      color: white;
    }

    /* ===== PAINEL FINANCEIRO ===== */
    #painel-section {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #222;
      border-radius: 8px;
      display: none;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #btnLogout {
      background-color: #ff4c4c;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      float: right;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    .acoes {
      margin-top: 15px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 10px;
      background-color: #FFD700;
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin: 5px 5px 0 0;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #FFB800;
    }

    /* Tabela */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      color: #fff;
    }
    th, td {
      border: 1px solid #444;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #333;
    }

    /* Barra de progresso */
    .barra {
      height: 20px;
      background-color: #333;
      margin-top: 10px;
      border-radius: 5px;
      overflow: hidden;
    }
    .progresso {
      height: 100%;
      background-color: #FFD700;
      width: 0%;
      transition: width 0.5s;
    }

    /* Canvas gráfico */
    canvas {
      width: 200px !important;
      height: 200px !important;
      margin: 20px auto;
      display: block;
    }

    @media (max-width: 600px) {
      body { padding: 10px; }
      table, tbody, tr, td, th { font-size: 14px; }
      canvas { width: 150px !important; height: 150px !important; }
      #login-section, #painel-section { margin: 20px auto; padding: 15px; }
      #btnLogout { float: none; width: 100%; margin-bottom: 20px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN / CADASTRO -->
  <div id="login-section" style="display:block;">
    <div class="login-card">
      <h1>🔐 Login no <span class="destaque">Painel Financeiro</span></h1>

      <div class="input-group">
        <label for="login-usuario">👤 Usuário</label>
        <input type="text" id="login-usuario" placeholder="Digite seu usuário" autocomplete="username" />
      </div>

      <div class="input-group">
        <label for="login-senha">🔒 Senha</label>
        <input type="password" id="login-senha" placeholder="Digite sua senha" autocomplete="current-password" />
      </div>

      <button class="btn-login" onclick="login()">Entrar</button>
      <div class="alerta" id="login-alerta"></div>

      <hr />

      <h2>Cadastrar novo usuário</h2>

      <div class="input-group">
        <label for="cad-usuario">👤 Novo Usuário</label>
        <input type="text" id="cad-usuario" placeholder="Digite novo usuário" autocomplete="username" />
      </div>

      <div class="input-group">
        <label for="cad-senha">🔒 Nova Senha</label>
        <input type="password" id="cad-senha" placeholder="Digite nova senha" autocomplete="new-password" />
      </div>

      <button class="btn-login" onclick="cadastrar()">Cadastrar</button>
      <div class="alerta" id="cad-alerta"></div>
    </div>
  </div>

  <!-- PAINEL FINANCEIRO -->
  <div id="painel-section" class="hidden">
    <button id="btnLogout" onclick="logout()">Sair</button>
    <h1>Painel Financeiro Inteligente</h1>

    <div class="acoes">
      <button class="btn" onclick="adicionarLinha()">+ Adicionar Dívida</button>
      <button class="btn" onclick="analisar()">Analisar Situação</button>
      <button class="btn" onclick="exportarPDF()">📄 Exportar como PDF</button>
      <button class="btn" onclick="limparTudo()">🧹 Limpar Tudo</button>
    </div>

    <label>💰 Renda mensal: R$ <input type="number" id="renda" step="0.01" min="0"></label><br><br>
    <label>💵 Quanto você pode pagar por mês? R$ <input type="number" id="pagamento" step="0.01" min="0"></label>

    <table id="tabela-dividas">
      <thead>
        <tr><th>Tipo</th><th>Valor Total (R$)</th><th>Parcelas</th><th>Valor da Parcela (R$)</th><th>Ação</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="barra"><div id="progresso" class="progresso"></div></div>
    <div id="alerta" class="alerta" style="margin-top:10px; text-align:center;"></div>
    <div class="resumo" id="resumo"></div>

    <canvas id="grafico"></canvas>
  </div>

<script>
  // Controle de usuários e sessão
  function pegarUsuarios() {
    return JSON.parse(localStorage.getItem('usuarios') || '{}');
  }
  function salvarUsuarios(usuarios) {
    localStorage.setItem('usuarios', JSON.stringify(usuarios));
  }

  // Cadastro de usuário
  function cadastrar() {
    const usuario = document.getElementById('cad-usuario').value.trim();
    const senha = document.getElementById('cad-senha').value.trim();
    const alerta = document.getElementById('cad-alerta');

    if (!usuario || !senha) {
      alerta.className = 'alerta error';
      alerta.innerText = 'Preencha usuário e senha para cadastro.';
      return;
    }

    let usuarios = pegarUsuarios();
    if (usuarios[usuario]) {
      alerta.className = 'alerta error';
      alerta.innerText = 'Usuário já existe. Escolha outro.';
      return;
    }

    usuarios[usuario] = senha; // Senha em texto puro (simplificado)
    salvarUsuarios(usuarios);
    alerta.className = 'alerta success';
    alerta.innerText = 'Usuário cadastrado com sucesso! Agora faça login.';

    // Limpar campos
    document.getElementById('cad-usuario').value = '';
    document.getElementById('cad-senha').value = '';
  }

  // Login
  function login() {
    const usuario = document.getElementById('login-usuario').value.trim();
    const senha = document.getElementById('login-senha').value.trim();
    const alerta = document.getElementById('login-alerta');

    if (!usuario || !senha) {
      alerta.className = 'alerta error';
      alerta.innerText = 'Preencha usuário e senha para entrar.';
      return;
    }

    const usuarios = pegarUsuarios();
    if (usuarios[usuario] && usuarios[usuario] === senha) {
      alerta.className = 'alerta success';
      alerta.innerText = 'Login realizado com sucesso!';
      localStorage.setItem('usuarioLogado', usuario);
      mostrarPainel();
    } else {
      alerta.className = 'alerta error';
      alerta.innerText = 'Usuário ou senha incorretos.';
    }
  }

  // Mostrar painel financeiro
  function mostrarPainel() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('painel-section').style.display = 'block';
    carregarDadosUsuario();
    analisar();
  }

  // Logout
  function logout() {
    localStorage.removeItem('usuarioLogado');
    location.reload();
  }

  // Checar sessão no load
  window.onload = function() {
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    if (usuarioLogado) {
      mostrarPainel();

      // Eventos para salvar e analisar ao mudar renda ou pagamento
      document.getElementById('renda').addEventListener('input', () => {
        salvarDadosUsuario();
        analisar();
      });
      document.getElementById('pagamento').addEventListener('input', () => {
        salvarDadosUsuario();
        analisar();
      });
    } else {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('painel-section').style.display = 'none';
    }
  };

  // --------- PAINEL FINANCEIRO ---------

  const tbody = document.querySelector('#tabela-dividas tbody');
  let chart = null;

  function adicionarLinha(tipo = '', valorTotal = '', parcelas = '') {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input class="tipo" value="${tipo}" placeholder="Ex: Cartão Nubank"></td>
      <td><input class="valor-total" type="number" value="${valorTotal}" step="0.01" min="0"></td>
      <td><input class="parcelas" type="number" value="${parcelas}" min="1"></td>
      <td class="valor-parcela">R$ 0,00</td>
      <td><button class="btn" onclick="removerLinha(this)">Remover</button></td>`;
    tbody.appendChild(tr);

    tr.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', () => {
        salvarDadosUsuario();
        analisar();
      });
    });

    analisar();
  }

  function removerLinha(botao) {
    botao.closest('tr').remove();
    salvarDadosUsuario();
    analisar();
  }

  function analisar() {
    const renda = parseFloat(document.getElementById('renda').value) || 0;
    const pagamento = parseFloat(document.getElementById('pagamento').value) || 0;
    let totalParcelas = 0, labels = [], dados = [], parcelasTotal = 0;

    tbody.querySelectorAll('tr').forEach(linha => {
      const tipo = linha.querySelector('.tipo').value.trim();
      const valorTotal = parseFloat(linha.querySelector('.valor-total').value) || 0;
      const qtdParcelas = parseInt(linha.querySelector('.parcelas').value) || 1;
      const valorParcela = valorTotal / qtdParcelas;

      linha.querySelector('.valor-parcela').innerText = "R$ " + valorParcela.toFixed(2);

      if (tipo && valorTotal > 0) {
        totalParcelas += valorParcela;
        labels.push(tipo);
        dados.push(valorParcela);
        parcelasTotal += qtdParcelas;
      }
    });

    const percentual = renda ? ((totalParcelas / renda) * 100) : 0;
    const sobra = renda - totalParcelas;

    document.getElementById("progresso").style.width = Math.min(100, percentual) + "%";

    const alerta = document.getElementById("alerta");
    alerta.style.borderLeftColor = percentual >= 80 ? "#f00" : percentual >= 50 ? "#FFA500" : "#32CD32";
    alerta.className = 'alerta'; // reset classes
    if (percentual >= 80) {
      alerta.classList.add('error');
      alerta.innerText = "⚠️ Renda altamente comprometida! Evite novos parcelamentos.";
    } else if (percentual >= 50) {
      alerta.classList.add('error');
      alerta.innerText = "🔶 Cuidado! Mais da metade da sua renda está comprometida.";
    } else {
      alerta.classList.add('success');
      alerta.innerText = "✅ Sua situação está sob controle. Mantenha o foco!";
    }

    if (totalParcelas > pagamento) {
      alerta.innerText += "\n❌ Você está pagando mais do que pode por mês!";
    }
    if (sobra < 0) {
      alerta.innerText += "\n🚨 Sua renda não cobre os pagamentos mensais!";
    }

    document.getElementById('resumo').innerHTML = `
      <strong>Total de parcelas mensais:</strong> R$ ${totalParcelas.toFixed(2)}<br>
      <strong>Total de parcelas restantes:</strong> ${parcelasTotal}<br>
      <strong>Percentual da renda comprometida:</strong> ${percentual.toFixed(2)}%<br>
      <strong>Sobra da renda:</strong> R$ ${sobra.toFixed(2)}
    `;

    const ctx = document.getElementById("grafico").getContext("2d");
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: "pie",
      data: {
        labels: labels,
        datasets: [{
          label: "Valores",
          data: dados,
          backgroundColor: ['#FFD700','#FF6347','#ADFF2F','#1E90FF','#FF69B4','#40E0D0','#FF8C00']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#fff' }
          }
        }
      }
    });
  }

  // Exportar PDF do painel
  function exportarPDF() {
    html2pdf().from(document.getElementById('painel-section')).save('painel-financeiro.pdf');
  }

  // Salvar dados financeiros do usuário no localStorage
  function salvarDadosUsuario() {
    const usuario = localStorage.getItem('usuarioLogado');
    if (!usuario) return;

    const dados = {
      renda: document.getElementById('renda').value,
      pagamento: document.getElementById('pagamento').value,
      dividas: []
    };

    tbody.querySelectorAll('tr').forEach(linha => {
      dados.dividas.push({
        tipo: linha.querySelector('.tipo').value,
        valorTotal: linha.querySelector('.valor-total').value,
        parcelas: linha.querySelector('.parcelas').value
      });
    });

    localStorage.setItem(`dados_${usuario}`, JSON.stringify(dados));
  }

  // Carregar dados financeiros do usuário
  function carregarDadosUsuario() {
    const usuario = localStorage.getItem('usuarioLogado');
    if (!usuario) return;

    const dados = JSON.parse(localStorage.getItem(`dados_${usuario}`) || '{}');

    document.getElementById('renda').value = dados.renda || '';
    document.getElementById('pagamento').value = dados.pagamento || '';

    tbody.innerHTML = '';
    if (dados.dividas && dados.dividas.length) {
      dados.dividas.forEach(d => adicionarLinha(d.tipo, d.valorTotal, d.parcelas));
    }
  }

  // Limpar tudo (inputs e tabela)
  function limparTudo() {
    if (!confirm('Tem certeza que quer limpar TODOS os dados?')) return;

    // Limpa inputs
    document.getElementById('renda').value = '';
    document.getElementById('pagamento').value = '';

    // Limpa tabela
    tbody.innerHTML = '';

    // Limpa gráfico, resumo e barra
    document.getElementById('progresso').style.width = '0%';
    document.getElementById('alerta').innerText = '';
    document.getElementById('resumo').innerHTML = '';

    if (chart) {
      chart.destroy();
      chart = null;
    }

    // Apaga dados salvos
    const usuario = localStorage.getItem('usuarioLogado');
    if (usuario) localStorage.removeItem(`dados_${usuario}`);
  }
</script>

</body>
</html>
